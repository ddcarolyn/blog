<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Keychron 产品知识测验</title>
<style>
  :root{
    --black:#161616; --ink:#1d1d1f; --gray:#6e6e73; --line:#e3e3e6;
    --bg:#f5f5f7; --card:#ffffff; --ok:#1a7f43; --okbg:#e9f6ee;
    --bad:#c0392b; --badbg:#fbeceb; --accent:#161616;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  /* top bar */
  header{position:sticky;top:0;z-index:20;background:var(--black);color:#fff;
         display:flex;align-items:center;justify-content:space-between;padding:14px 24px}
  .brand{font-weight:800;letter-spacing:3px;font-size:18px}
  .brand small{font-weight:500;letter-spacing:1px;opacity:.7;font-size:11px;margin-left:10px}
  .navhint{font-size:12px;opacity:.6;letter-spacing:1px}
  /* hero */
  .hero{max-width:780px;margin:0 auto;padding:56px 24px 28px;text-align:center}
  .hero h1{font-size:34px;font-weight:800;letter-spacing:-.5px}
  .hero p{color:var(--gray);margin-top:12px;font-size:15px}
  .meta{display:inline-flex;gap:18px;margin-top:22px;flex-wrap:wrap;justify-content:center}
  .meta span{font-size:12.5px;color:var(--gray);letter-spacing:.5px;text-transform:uppercase}
  .meta b{color:var(--ink)}
  /* progress */
  .bar{position:sticky;top:52px;z-index:15;height:3px;background:var(--line)}
  .bar>i{display:block;height:100%;width:0;background:var(--black);transition:width .3s}
  /* quiz */
  main{max-width:780px;margin:0 auto;padding:8px 24px 80px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
        padding:26px 26px 22px;margin:18px 0;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .chip{display:inline-block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
        color:var(--gray);border:1px solid var(--line);border-radius:999px;padding:3px 11px;margin-bottom:14px}
  .q{font-size:17px;font-weight:700;margin-bottom:6px}
  .q .num{color:var(--gray);font-weight:800;margin-right:8px}
  .opts{margin-top:14px;display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:flex-start;gap:12px;border:1.5px solid var(--line);border-radius:12px;
       padding:13px 15px;cursor:pointer;transition:.15s;font-size:14.5px;background:#fff}
  .opt:hover{border-color:#bcbcc2;background:#fafafa}
  .opt .key{flex:none;width:24px;height:24px;border:1.5px solid var(--line);border-radius:50%;
            display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--gray);transition:.15s}
  .opt.sel{border-color:var(--black);background:#fbfbfb}
  .opt.sel .key{background:var(--black);color:#fff;border-color:var(--black)}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.correct .key{background:var(--ok);color:#fff;border-color:var(--ok)}
  .opt.wrong{border-color:var(--bad);background:var(--badbg)}
  .opt.wrong .key{background:var(--bad);color:#fff;border-color:var(--bad)}
  .locked .opt{cursor:default;pointer-events:none}
  .exp{margin-top:14px;font-size:13.5px;color:#3a3a3c;background:#f6f6f8;border-left:3px solid var(--black);
       padding:11px 14px;border-radius:0 8px 8px 0;display:none}
  .exp.show{display:block}
  .exp b{color:var(--ok)}
  /* name box */
  .namebox{max-width:780px;margin:6px auto 0;padding:0 24px}
  .namebox label{display:block;font-size:12.5px;color:var(--gray);letter-spacing:.5px;margin:0 2px 8px;text-transform:uppercase}
  .namebox input{width:100%;font-size:15px;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;
       background:#fff;color:var(--ink);outline:none;transition:.15s;font-family:inherit}
  .namebox input:focus{border-color:var(--black)}
  .namebox input.miss{border-color:var(--bad);background:var(--badbg)}
  /* submit / result */
  .actions{text-align:center;margin:30px 0}
  .btn{appearance:none;border:none;background:var(--black);color:#fff;font-size:14px;font-weight:700;
       letter-spacing:1.5px;text-transform:uppercase;padding:15px 44px;border-radius:999px;cursor:pointer;transition:.2s}
  .btn:hover{opacity:.85;transform:translateY(-1px)}
  .btn.ghost{background:#fff;color:var(--black);border:1.5px solid var(--black)}
  .result{display:none;background:var(--black);color:#fff;border-radius:20px;padding:40px 30px;text-align:center;margin:20px 0}
  .result.show{display:block;animation:pop .4s ease}
  @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  .score{font-size:64px;font-weight:800;line-height:1}
  .score small{font-size:22px;opacity:.5;font-weight:600}
  .result p{opacity:.8;margin-top:10px}
  .grade{display:inline-block;margin-top:18px;font-size:13px;letter-spacing:2px;text-transform:uppercase;
         border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:6px 18px}
  footer{text-align:center;color:var(--gray);font-size:12px;padding:30px;letter-spacing:.5px}
  @media(max-width:560px){.hero h1{font-size:26px}.q{font-size:15.5px}}
</style>
</head>
<body>
<header>
  <div class="brand">KEYCHRON<small>产品知识测验</small></div>
  <div class="navhint">PRODUCT QUIZ</div>
</header>
<div class="bar"><i id="prog"></i></div>

<section class="hero">
  <h1>Keychron 产品知识测验</h1>
  <p>覆盖 SKU 解码 · 产品系列 · 价格定位 · 品牌 · Launcher 软件五大维度<br>选完所有题目后点击「提交」即可自动判分并查看答案解析。</p>
  <div class="meta">
    <span>题量 <b>18 题</b></span>
    <span>满分 <b>100 分</b></span>
    <span>难度 <b>入门 → 进阶</b></span>
  </div>
</section>

<main>
  <div class="namebox">
    <label for="userName">姓名（必填 · 用于记录成绩）</label>
    <input id="userName" type="text" maxlength="40" placeholder="请输入你的姓名" autocomplete="name">
  </div>
  <div id="quiz"></div>

  <div class="actions" id="submitWrap">
    <button class="btn" id="submitBtn">提交并查看成绩</button>
  </div>

  <div class="result" id="result">
    <div class="score"><span id="scoreNum">0</span><small> / 100</small></div>
    <p id="scoreLine">答对 0 / 18 题</p>
    <div class="grade" id="grade">—</div>
    <p id="reportStatus" style="margin-top:14px;font-size:12.5px;opacity:.85"></p>
  </div>

  <div class="actions" id="retryWrap" style="display:none">
    <button class="btn ghost" id="retryBtn">重新作答</button>
  </div>
</main>

<footer>仅用于内部产品培训 · 答案基于 Keychron 官网与 SKU 培训资料整理</footer>

<script>
const QUESTIONS = [
  {cat:"SKU 解码", q:"SKU「Q1P-M3」代表的是哪一款产品？",
   opts:["Q1 Pro，灰壳整机，红轴","Q1 Pro，黑壳整机，茶轴","Q1 Pro，白壳套件，茶轴","Q1 Pro，黑壳套件，红轴"],
   a:1, exp:"M = 旋钮全套整机·黑壳，3 = 茶轴。Q Pro 默认带旋钮 + RGB + 热插拔。"},
  {cat:"SKU 解码", q:"「Q3P-N3-ISO」的完整含义是？",
   opts:["Q3 Pro，灰壳整机，茶轴，欧洲 ISO 布局","Q3 Pro，黑壳整机，红轴，日本布局","Q3 Pro，白壳套件，茶轴，美国布局","Q3 Pro，灰壳套件，香蕉轴，ISO"],
   a:0, exp:"N = 整机灰壳，3 = 茶轴，尾缀 -ISO = 欧洲布局。"},
  {cat:"SKU 解码", q:"下列哪个 SKU 是「旋钮套件 / barebone」而不是能直接打字的整机？",
   opts:["Q1P-M1","Q1P-N3","Q1P-B2","Q1P-P4"],
   a:2, exp:"B = 旋钮套件，只含外壳套件、不含键帽和轴体，需另配后才能使用。M/N/P 开头才是整机。"},
  {cat:"SKU 解码", q:"客户想要「白色外壳 + 茶轴」的 Q1 Pro 整机，应下单哪个 SKU？",
   opts:["Q1P-P3","Q1P-M3","Q1P-N3","Q1P-P1"],
   a:0, exp:"P = 整机白壳，3 = 茶轴。P1 是白壳红轴，M3 是黑壳茶轴。"},
  {cat:"SKU 解码", q:"SKU 尾缀「-JIS」表示什么？",
   opts:["静音轴版本","日本布局","无线版本","香槟金配色"],
   a:1, exp:"-JIS = 日本布局；无尾缀 = 美国 US，-ISO = 欧洲。"},
  {cat:"情景应用", q:"客户来信：「收到 Q1 Pro，黑色外壳很搭桌垫，但想换克重更大的轴，不太适应它的红轴。」他买的 SKU 最可能是？",
   opts:["Q1P-M4","Q1P-N3","Q1P-M1","Q1P-P1"],
   a:2, exp:"黑壳整机 = M；现用红轴 = 1，所以是 M1。M4 是香蕉轴、N3 是灰壳，均不符。"},
  {cat:"产品系列", q:"把 Q / V / K / B 四个系列按价格「从高到低」排序，正确的是？",
   opts:["Q > K > V > B","K > Q > B > V","B > V > K > Q","V > Q > K > B"],
   a:0, exp:"Q（全金属旗舰）最高，B（超薄入门）最低，约 $34 起。"},
  {cat:"产品系列", q:"V 系列功能与 Q 系列接近，主要靠改了什么来降低成本？",
   opts:["去掉了热插拔","用塑料外壳替代铝合金外壳","取消 RGB 背光","只能有线连接"],
   a:1, exp:"V 系列保留 Gasket / 吸音棉 / 热插拔等核心体验，主要差别是塑料壳 vs 铝合金壳。"},
  {cat:"产品系列", q:"B 系列为什么能做到「超薄 + 最低价」？",
   opts:["采用剪刀脚 / 薄膜结构（非机械轴）","没有外壳","用单色塑料键帽","完全不支持无线"],
   a:0, exp:"B 系列以剪刀脚 / 薄膜结构代替机械轴，更薄更轻，价格也最低。"},
  {cat:"品牌认知", q:"「Lemokey」是什么？",
   opts:["Keychron 的键帽品牌","Keychron 旗下的电竞磁轴（HE）子品牌","一款无线接收器型号","一个客制化社区"],
   a:1, exp:"Lemokey 主打 HE 磁轴 + 8K + Rapid Trigger，面向 FPS / 竞技玩家，代表为 P 系列。"},
  {cat:"产品系列", q:"产品后缀按配置「从低到高」排序，正确的是？",
   opts:["Pro < Max < HE < Ultra","Ultra < HE < Max < Pro","Max < Pro < Ultra < HE","HE < Pro < Max < Ultra"],
   a:0, exp:"Standard < Pro < Max < HE < Ultra，后缀越靠后配置/价格越高。"},
  {cat:"产品系列", q:"「Max」相比「Pro」主要多了哪些料？",
   opts:["仅多一个旋钮","全金属外壳 + 吸音棉 + 2.4G 无线","仅更换轴体","只是配色不同"],
   a:1, exp:"Max = 全金属 + 吸音棉 + Gasket + 2.4G；Pro 多为塑料壳 + 蓝牙。"},
  {cat:"价格定位", q:"官网价格最低、约 $34 起的键盘属于哪个系列？",
   opts:["K 系列","V 系列","B 系列","Q 系列"],
   a:2, exp:"B 系列是入门引流款，价格全系列最低。"},
  {cat:"品牌认知", q:"Keychron 的品牌核心定位 / 口号（英文）是？",
   opts:['"Type Faster"','"Custom Mechanical Keyboards"','"Gaming First"','"Office Essentials"'],
   a:1, exp:'Keychron 主打「Custom Mechanical Keyboards」可定制机械键盘，强调可玩性与多设备通用。'},
  {cat:"Launcher", q:"关于 Keychron Launcher，描述正确的是？",
   opts:["必须下载安装的桌面客户端","基于 WebHID 的网页应用，用 Chrome/Edge/Opera 授权即用","只有手机 App","就是固件本身"],
   a:1, exp:"Launcher 是网页驱动，无需安装，通过 WebHID 在浏览器中直接连接设备。"},
  {cat:"Launcher", q:"想把 Caps Lock 改成 Ctrl，正确操作是？",
   opts:["进 Keymap 模块选中按键改键值，即时生效、无需保存","先用 Macro 录制再绑定","在 Lighting 模块设置","必须重新刷固件"],
   a:0, exp:"在 Keymap 里点选按键 → 在 Basic 分类选 Left Ctrl，更改即时生效。"},
  {cat:"Launcher", q:"磁轴的「Rapid Trigger（快速触发）」解决了什么痛点？",
   opts:["灯光延迟","传统轴必须回弹到固定点才能再触发；它在任意深度检测到抬起即复位","蓝牙断连","键帽磨损"],
   a:1, exp:"动态复位让急停 / 连击更跟手，特别适合 FPS 与音游。"},
  {cat:"Launcher", q:"固件升级过程中，下列哪种操作是「绝对禁止」的？",
   opts:["保持有线连接","断电 / 拔 USB 线 / 关闭浏览器","事先查看版本号","更新后重新连接设备"],
   a:1, exp:"升级中断电、拔线或关闭浏览器可能导致设备「变砖」。"}
];

const PER = +(100/QUESTIONS.length).toFixed(4);
const quizEl = document.getElementById('quiz');
const answers = new Array(QUESTIONS.length).fill(null);
let locked = false;

function render(){
  quizEl.innerHTML = '';
  QUESTIONS.forEach((item,i)=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `<span class="chip">${item.cat}</span>
      <div class="q"><span class="num">${String(i+1).padStart(2,'0')}</span>${item.q}</div>
      <div class="opts" data-q="${i}"></div>
      <div class="exp" id="exp${i}"><b>正确答案 ${'ABCD'[item.a]}.</b> ${item.exp}</div>`;
    const opts = card.querySelector('.opts');
    item.opts.forEach((o,j)=>{
      const el=document.createElement('div');
      el.className='opt'; el.dataset.q=i; el.dataset.j=j;
      el.innerHTML=`<span class="key">${'ABCD'[j]}</span><span>${o}</span>`;
      el.addEventListener('click',()=>select(i,j));
      opts.appendChild(el);
    });
    quizEl.appendChild(card);
  });
  updateProgress();
}
function select(i,j){
  if(locked) return;
  answers[i]=j;
  document.querySelectorAll(`.opt[data-q="${i}"]`).forEach(el=>{
    el.classList.toggle('sel', +el.dataset.j===j);
  });
  updateProgress();
}
function updateProgress(){
  const done=answers.filter(a=>a!==null).length;
  document.getElementById('prog').style.width=(done/QUESTIONS.length*100)+'%';
}
const REPORT_URL="https://quiz-api.ddcarolyn.com";
function reportScore(name,score,correct,total,grade){
  const detail=QUESTIONS.map((item,i)=>`${i+1}${answers[i]===item.a?'✓':'✗'}`).join(' ');
  const st=document.getElementById('reportStatus');
  if(st) st.textContent='成绩记录中…';
  fetch(REPORT_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,score,correct,total,grade,detail})})
    .then(r=>r.json())
    .then(d=>{ if(st) st.textContent=(d&&d.ok)?'✓ 成绩已记录到后台':('✗ 记录失败：'+(d&&d.error||'未知')+'（请截图反馈）'); })
    .catch(err=>{ if(st) st.textContent='✗ 记录失败：网络无法连接后台（请截图反馈）'; });
}
function submit(){
  const nameEl=document.getElementById('userName');
  const userName=nameEl.value.trim();
  if(!userName){
    nameEl.classList.add('miss');
    alert('请先在顶部填写你的姓名，再提交成绩。');
    nameEl.scrollIntoView({behavior:'smooth',block:'center'});
    nameEl.focus();
    return;
  }
  nameEl.classList.remove('miss');
  const unfilled=answers.findIndex(a=>a===null);
  if(unfilled>-1){
    alert(`还有 ${answers.filter(a=>a===null).length} 题未作答（第 ${unfilled+1} 题等）。`);
    document.querySelectorAll('.card')[unfilled].scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  locked=true;
  let correct=0;
  QUESTIONS.forEach((item,i)=>{
    const sel=answers[i];
    if(sel===item.a) correct++;
    document.querySelectorAll(`.opts[data-q="${i}"]`)[0].parentElement.classList.add('locked');
    document.querySelectorAll(`.opt[data-q="${i}"]`).forEach(el=>{
      const j=+el.dataset.j;
      el.classList.remove('sel');
      if(j===item.a) el.classList.add('correct');
      else if(j===sel) el.classList.add('wrong');
    });
    document.getElementById('exp'+i).classList.add('show');
  });
  const score=Math.round(correct*PER);
  document.getElementById('submitWrap').style.display='none';
  document.getElementById('retryWrap').style.display='block';
  const res=document.getElementById('result');
  document.getElementById('scoreNum').textContent=score;
  document.getElementById('scoreLine').textContent=`答对 ${correct} / ${QUESTIONS.length} 题`;
  let g='继续加油 · KEEP LEARNING';
  if(score>=90) g='产品专家 · EXPERT';
  else if(score>=75) g='熟练掌握 · PROFICIENT';
  else if(score>=60) g='基本合格 · PASS';
  document.getElementById('grade').textContent=g;
  res.classList.add('show');
  res.scrollIntoView({behavior:'smooth',block:'center'});
  reportScore(document.getElementById('userName').value.trim(),score,correct,QUESTIONS.length,g);
}
function retry(){
  locked=false;
  answers.fill(null);
  document.getElementById('result').classList.remove('show');
  document.getElementById('submitWrap').style.display='block';
  document.getElementById('retryWrap').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('submitBtn').addEventListener('click',submit);
document.getElementById('retryBtn').addEventListener('click',retry);
render();
</script>
</body>
</html>
