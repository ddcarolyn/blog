<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB',sans-serif">
  <style>
    .label { fill: #1f2937; font-size: 14px; }
    .title { fill: #1f2937; font-size: 16px; font-weight: 600; }
    .sub { fill: #6b7280; font-size: 12px; }
    .arrow-r { stroke: #d97706; }
    .arrow-b { stroke: #2563eb; }
    .node-r { fill: #fef3c7; stroke: #d97706; }
    .node-b { fill: #dbeafe; stroke: #2563eb; }
    .ring-r { fill: #fef3c7; stroke: #d97706; }
    .ring-b { fill: #dbeafe; stroke: #2563eb; }
    @media (prefers-color-scheme: dark) {
      .label { fill: #e5e7eb; }
      .title { fill: #f3f4f6; }
      .sub { fill: #9ca3af; }
      .node-r { fill: rgba(217,119,6,0.18); }
      .node-b { fill: rgba(37,99,235,0.18); }
      .ring-r { fill: rgba(217,119,6,0.18); }
      .ring-b { fill: rgba(37,99,235,0.18); }
    }
  </style>
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Left: R1 short loop -->
  <text class="title" x="180" y="28" text-anchor="middle">R1 短反馈环（秒级 · 增强）</text>
  <text class="sub" x="180" y="46" text-anchor="middle">通知 → 多巴胺 → 更需要通知</text>

  <g>
    <rect class="node-r" x="80" y="80" width="200" height="44" rx="22" stroke-width="1.5"/>
    <text class="label" x="180" y="108" text-anchor="middle">IM 弹出 / 邮件 / 红点</text>

    <rect class="node-r" x="40" y="170" width="160" height="44" rx="22" stroke-width="1.5"/>
    <text class="label" x="120" y="198" text-anchor="middle">多巴胺微反馈</text>

    <rect class="node-r" x="160" y="260" width="220" height="44" rx="22" stroke-width="1.5"/>
    <text class="label" x="270" y="288" text-anchor="middle">注意力进一步散</text>

    <rect class="node-r" x="240" y="170" width="160" height="44" rx="22" stroke-width="1.5"/>
    <text class="label" x="320" y="198" text-anchor="middle">更依赖通知</text>

    <!-- arrows -->
    <path d="M 145 124 Q 100 145 110 168" fill="none" stroke-width="2" class="arrow-r" marker-end="url(#arrR)"/>
    <path d="M 150 214 Q 175 240 200 258" fill="none" stroke-width="2" class="arrow-r" marker-end="url(#arrR)"/>
    <path d="M 320 260 Q 340 235 320 216" fill="none" stroke-width="2" class="arrow-r" marker-end="url(#arrR)"/>
    <path d="M 290 170 Q 240 130 250 124" fill="none" stroke-width="2" class="arrow-r" marker-end="url(#arrR)"/>

    <!-- center R label -->
    <circle class="ring-r" cx="200" cy="192" r="22" stroke-width="1.5"/>
    <text class="title" x="200" y="198" text-anchor="middle" font-size="18" fill="#d97706">R</text>
  </g>

  <!-- Right: B1 long loop -->
  <text class="title" x="580" y="28" text-anchor="middle">B1 长反馈环（天/周级 · 平衡）</text>
  <text class="sub" x="580" y="46" text-anchor="middle">长任务 → 完成 → 成就感 → 投入</text>

  <g>
    <rect class="node-b" x="490" y="80" width="180" height="44" rx="22" stroke-width="1.5"/>
    <text class="label" x="580" y="108" text-anchor="middle">长程任务（数天/周）</text>

    <rect class="node-b" x="440" y="170" width="140" height="44" rx="22" stroke-width="1.5"/>
    <text class="label" x="510" y="198" text-anchor="middle">终于完成</text>

    <rect class="node-b" x="560" y="260" width="180" height="44" rx="22" stroke-width="1.5"/>
    <text class="label" x="650" y="288" text-anchor="middle">大成就感（迟到）</text>

    <rect class="node-b" x="620" y="170" width="120" height="44" rx="22" stroke-width="1.5"/>
    <text class="label" x="680" y="198" text-anchor="middle">继续投入</text>

    <path d="M 540 124 Q 500 145 510 168" fill="none" stroke-width="2" class="arrow-b" marker-end="url(#arrB)"/>
    <path d="M 540 214 Q 580 240 600 258" fill="none" stroke-width="2" class="arrow-b" marker-end="url(#arrB)"/>
    <path d="M 700 260 Q 720 235 700 216" fill="none" stroke-width="2" class="arrow-b" marker-end="url(#arrB)"/>
    <path d="M 660 170 Q 620 135 630 124" fill="none" stroke-width="2" class="arrow-b" marker-end="url(#arrB)"/>

    <circle class="ring-b" cx="600" cy="192" r="22" stroke-width="1.5"/>
    <text class="title" x="600" y="198" text-anchor="middle" font-size="18" fill="#2563eb">B</text>
  </g>

  <!-- bottom annotation -->
  <text class="sub" x="380" y="350" text-anchor="middle">短反馈环周期 ≈ 秒，长反馈环周期 ≈ 天/周 — 短环天然压制长环</text>
</svg>
